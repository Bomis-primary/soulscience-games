<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovine Race Animation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 1. Logo Screen Styling */
        .logo-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            object-fit: contain;
            /* Simple fade-in animation for visual polish */
            animation: fadeIn 1.5s ease-in-out; 
        }

        /* 2. Race Track & Runner Styling */
        .race-track {
            position: relative;
            width: 80%;
            max-width: 800px;
            height: 100px;
            background-color: #333;
            border-top: 4px dashed #fff;
            border-bottom: 4px dashed #fff;
            display: flex;
            align-items: center;
            border-radius: 8px;
        }

        .runner {
            position: absolute;
            left: 0;
            font-size: 3rem;
            /* CRITICAL FIX: scaleX(-1) flips the emoji horizontally to face right */
            transform: scaleX(-1); 
            animation: race 5s linear infinite;
        }

        .finish-line {
            position: absolute;
            right: 20px;
            font-size: 2.5rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes race {
            0% {
                /* Keeps the flip active while moving */
                left: 0%;
                transform: scaleX(-1); 
            }
            90% {
                left: calc(100% - 80px);
                transform: scaleX(-1);
            }
            100% {
                left: calc(100% - 80px);
                transform: scaleX(-1);
            }
        }
    </style>
</head>
<body>

    <!-- Logo Screen Section -->
    <div class="logo-screen">
        <!-- FIX 1: Pointing to the asset directory explicitly -->
        <img src="asset/innovine-logo.png" alt="Innovine Logo" class="logo-img" onerror="this.onerror=null; console.error('Logo failed to load. Check if file name matches exactly.');">
    </div>

    <!-- Race Animation Section -->
    <div class="race-track">
        <!-- FIX 2: The runner emoji style handles the orientation flip -->
        <div class="runner">🏃</div>
        <div class="finish-line">🏁</div>
    </div>

</body>
</html>
